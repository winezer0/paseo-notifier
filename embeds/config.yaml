# paseo-notifier 配置文件
#
# 搜索顺序（优先级从高到低）：
#   1. --config 参数指定的路径
#   2. 程序所在目录下的 paseo-notifier.yaml
#   3. 以上都找不到则使用内置默认配置（仅日志输出）

# 监控相关配置
monitor:
  # Paseo 守护进程基础地址（会自动推导 MCP 端点 <地址>/mcp/agents 和 WebSocket 端点 ws://<地址>/ws）
  daemon_url: "http://127.0.0.1:6767"
  # 轮询间隔（Go time.Duration 格式）
  interval: "5s"
  # 卡死检测超时（Go time.Duration 格式），0s/0m/0h/false/空 = 禁用，默认 120s
  stuck_detect_timeout: 120s
  # 检测到卡死后延迟重启（Go time.Duration 格式），0s/0m/0h/false/空 = 禁用，默认 0s
  stuck_restart_delay: 0s
  # 自动重启最大重试次数，默认 5
  stuck_restart_retry: 5
  # 运行中状态心跳通知间隔（Go time.Duration 格式），0s/0m/0h/false/空 = 禁用，默认 5m
  # 对持续运行超过此间隔且用户无交互的 Agent，定期发送运行状态通知
  running_status_interval: 5m
  # subagent 持续运行通知间隔（Go time.Duration 格式），0s/false/空 = 禁用，默认 3m
  # 当 agent 的 subagent 持续运行超过此间隔时，定期发送运行状态通知
  subagent_running_interval: 3m
  # 匹配关键字自动继续（true/false，默认 false）
  # Agent 任务完成后，若最后一条活动包含"继续"/"continue"等关键词或冒号结尾，自动发送继续提示
  # 适用于大模型执行完一轮后询问"是否继续"的场景
  auto_continue_keyword: false
  # 子任务完成后自动继续（true/false，默认 false）
  # 当所有 subagent 完成且主 agent 处于空闲状态时，自动发送继续提示唤醒主 Agent
  auto_continue_subagent: false
  # 通知事件开关（可选，全部省略 = 所有事件启用）
  # 默认为 true，显式设为 false 可禁用该事件的通知
  events:           # 删除此行可恢复全量通知
    running_status: true   # 运行中状态心跳（高频，可设为 false 减少打扰）
    still_active: true     # 活动正常（二次确认后，不需要可关闭）
    stuck_continue: true   # 卡死恢复尝试
    # 其余事件默认启用，需要禁用请取消注释并设为 false：
    # finished: false
    # error: false
    # permission_requested: false
    # stuck_warning: false
    # stuck: false
    # subagent_spawned: false
    # subagent_running: false
    # all_subagents_done: false
    # auto_continue: false
    # startup: false
    # disconnect: false
    # reconnect: false
  # 最短任务通知时长（Go time.Duration 格式），0s/0m/0h/false/空 = 不抑制，默认 30s
  # 短于此时长完成的任务不发送通知（用户通常已看到结果，通知无意义）
  notify_min_duration: 30s

# 通用配置（日志、语言等）
common:
  # 日志级别，可选 debug/info/warn/error（默认 info）
  log_level: "info"
  # 日志文件路径（默认：程序所在目录下的 paseo-notifier.log）
  # 留空则使用默认路径，日志文件超 10MB 自动轮转清理
  log_file: ""
  # 是否同时输出日志到控制台（默认 true）
  # 前台运行时建议开启，系统服务模式可设为 false 避免无控制台输出
  log_console: "TLM"
  # 通知消息语言（默认 auto）
  # auto: 自动检测系统语言（中文系统→zh，其他→en）
  # zh:   中文
  # en:   英文
  language: "auto"

# 通知供应商配置
# providers 是一个数组，可以同时配置多个供应商
# 所有供应商会同时发送通知
# 不配置任何供应商时，事件仅输出到日志
notifier:
  providers:
    # ---- 类型: console ----
    # 控制台输出（带 emoji 格式），enable: true 时启用
    # 未配置 console 且无其他供应商时，事件仅输出到日志
    - type: "console"
      config:
        enable: true

    # ---- 类型: dingtalk ----
    # 钉钉自定义机器人（Webhook + 加签）
    # - type: "dingtalk"
    #   config:
    #     access_token: ""
    #     secret: ""

    # ---- 类型: lark_webhook ----
    # 飞书群聊机器人（Webhook 模式，已支持签名验证）
    # 在飞书群中添加"自定义机器人"，获取 Webhook URL 和 Secret（签名密钥）
    # webhook_url: 机器人的 Webhook 地址（必填）
    # secret: 签名验证密钥（选填，建议在飞书机器人设置中开启"签名校验"后填写）
    #   若填写 secret，每次发送消息会自动附加 HMAC-SHA256 签名；
    #   若留空则不附加签名（仅适用于未开启安全设置的机器人）。
    # - type: "lark_webhook"
    #   config:
    #     webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/your-webhook-id"
    #     secret: "your-webhook-secret"

    # ---- 类型: lark_app ----
    # 飞书自应用（支持指定接收者）
    # 需要在飞书开放平台创建应用，开启 im:message 权限
    # receivers 支持的类型：open_id, user_id, union_id, email, chat_id
    # - type: "lark_app"
    #   config:
    #     app_id: "cli_your-app-id"
    #     app_secret: "your-app-secret"
    #     receivers:
    #       - type: chat_id
    #         value: "oc_your-chat-id"
    #       - type: user_id
    #         value: "your-user-id"